name: GitHub-Profile-Summary-Cards
on:
  schedule:
    # Runs every day at 3am UTC
    - cron: '0 3 * * *'
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    name: generate-github-profile-summary-cards
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
      - uses: vn7n24fzkq/github-profile-summary-cards@release
        env:
          # Prefers a classic PAT (read:user + repo) saved as the GH_TOKEN secret,
          # which is required to include private-repo contributions. Falls back to
          # the built-in token, which only sees public activity.
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN || secrets.GITHUB_TOKEN }}
        with:
          USERNAME: mesirendon
          BRANCH_NAME: "main"
          THEME: nord_dark
          AUTO_PUSH: true
